version: '3.8'

services:
  app:
    build: .
    ports:
      - "3719:3719"
    environment:
      - DATABASE_URL=postgres://sasha_dev:secure_pass_123@db:5432/game_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=sasha_dev
      - POSTGRES_PASSWORD=secure_pass_123
      - POSTGRES_DB=game_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sasha_dev -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
