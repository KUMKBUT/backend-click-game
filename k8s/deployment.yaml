apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-app-deployment
  labels:
    app: clicker-backend
spec:
  replicas: 8
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: clicker-backend
  template:
    metadata:
      labels:
        app: clicker-backend
    spec:
      # Гарантируем равномерное распределение по нодам
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: clicker-backend
      containers:
      - name: rust-app
        image: learn-rust-app:v916
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3719
        env:
          # Через PgBouncer — уменьшаем pool до 20 соединений на реплику
          # 8 реплик × 20 = 160 соединений к PgBouncer, который сам держит 50 к Postgres
          - name: DATABASE_URL
            value: "postgres://sasha_dev:secure_pass_123@pgbouncer-service:5432/game_db"
          - name: REDIS_URL
            value: "redis://redis-service:6379"
          - name: DB_POOL_SIZE
            value: "20"
          # Tokio: используем все доступные CPU
          - name: TOKIO_WORKER_THREADS
            value: "4"
        resources:
          requests:
            cpu: "500m"
            memory: "128Mi"
          limits:
            cpu: "2000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3719
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3719
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2